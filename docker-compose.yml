version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: betting-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-betting}
    ports:
      - "3306:3306"
    volumes:
      - ./mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7
    container_name: betting-redis
    ports:
      - "6379:6379"

  node:
    image: node:20
    container_name: betting-node
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - "3000:3000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-betting}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3000
      ODDS_API_KEY: ${ODDS_API_KEY:-}
      ODDS_SYNC_INTERVAL: ${ODDS_SYNC_INTERVAL:-300000}
      ODDS_SPORTS: ${ODDS_SPORTS:-soccer_epl,basketball_nba,soccer_uefa_champs_league}
    command: sh -c "npm install && npx tsc && node dist/index.js"
    depends_on:
      - mysql
      - redis